  <style>
    :root {
      --bg: #050507;
      --bg2: #0a0a0f;
      --bg3: #0f0f18;
      --coral: #ff4c4c;
      --coral2: #ff6b6b;
      --coral-dim: rgba(255, 76, 76, 0.12);
      --coral-glow: rgba(255, 76, 76, 0.35);
      --glass: rgba(255, 255, 255, 0.04);
      --glass2: rgba(255, 255, 255, 0.07);
      --glass3: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 76, 76, 0.25);
      --text: #f0f0f0;
      --text2: #999;
      --text3: #555;
      --user-bg: rgba(255, 76, 76, 0.08);
      --font-h: "Orbitron", sans-serif;
      --font-b: "Rajdhani", sans-serif;
      --font-c: "JetBrains Mono", monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      display: flex;
      height: 100dvh;
      letter-spacing: 0.3px;
      cursor: default;
    }

    /* ===== NOISE OVERLAY ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ===== AMBIENT ORBS ===== */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb1 {
      width: 400px;
      height: 400px;
      background: rgba(255, 76, 76, 0.06);
      top: -100px;
      right: -100px;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb2 {
      width: 300px;
      height: 300px;
      background: rgba(255, 76, 76, 0.04);
      bottom: -50px;
      left: -50px;
      animation: orbFloat 12s ease-in-out infinite reverse;
    }

    .orb3 {
      width: 200px;
      height: 200px;
      background: rgba(150, 50, 255, 0.03);
      top: 50%;
      left: 50%;
      animation: orbFloat 10s ease-in-out infinite 3s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(20px, -20px) scale(1.05);
      }

      66% {
        transform: translate(-15px, 15px) scale(0.95);
      }
    }

    /* ============================
         SPLASH SCREEN
      ============================*/
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #splash.hide {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    /* LOGO SVG */
    .splash-logo {
      width: 130px;
      height: 130px;
      margin-bottom: 36px;
      position: relative;
      animation: logoEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes logoEntrance {
      0% {
        opacity: 0;
        transform: scale(0.5) rotate(-20deg);
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px var(--coral-glow));
    }

    /* Pulse rings */
    .pulse-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid var(--coral-glow);
      animation: pulseRing 2s ease-out infinite;
      opacity: 0;
    }

    .pulse-ring:nth-child(2) {
      animation-delay: 0.6s;
    }

    .pulse-ring:nth-child(3) {
      animation-delay: 1.2s;
    }

    @keyframes pulseRing {
      0% {
        transform: scale(0.8);
        opacity: 0.6;
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    .splash-tagline {
      font-family: var(--font-h);
      font-size: clamp(0.55rem, 2vw, 0.7rem);
      letter-spacing: 6px;
      color: var(--coral);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .splash-name {
      font-family: var(--font-h);
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 2px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
      margin-bottom: 6px;
    }

    .splash-sub {
      font-size: 0.85rem;
      color: var(--text2);
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
      margin-bottom: 48px;
      font-family: var(--font-c);
    }

    .splash-enter-btn {
      padding: 14px 44px;
      background: transparent;
      border: 1px solid var(--coral);
      color: var(--coral);
      font-family: var(--font-h);
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.6s;
      transition: color 0.3s, box-shadow 0.3s;
    }

    .splash-enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--coral);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
    }

    .splash-enter-btn:hover {
      color: #000;
      box-shadow: 0 0 30px var(--coral-glow);
    }

    .splash-enter-btn:hover::before {
      transform: translateX(0);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }


    /* ============================
         PROCESSING SCREEN
      ============================*/
    #processing {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
    }

    #processing.show {
      display: flex;
    }

    .proc-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 32px;
      animation: procSpin 2s linear infinite;
      filter: drop-shadow(0 0 15px var(--coral-glow));
    }

    @keyframes procSpin {
      0% {
        filter: drop-shadow(0 0 15px var(--coral-glow));
      }

      50% {
        filter: drop-shadow(0 0 30px var(--coral));
      }

      100% {
        filter: drop-shadow(0 0 15px var(--coral-glow));
      }
    }

    .proc-text {
      font-family: var(--font-c);
      font-size: 0.72rem;
      letter-spacing: 4px;
      color: var(--coral);
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .proc-bar-wrap {
      width: 280px;
      height: 2px;
      background: var(--glass2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .proc-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--coral), var(--coral2));
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px var(--coral-glow);
    }

    .proc-steps {
      font-family: var(--font-c);
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 2px;
      text-align: center;
      min-height: 20px;
    }

    /* ============================
         SIDEBAR
      ============================*/
    .sidebar {
      width: 256px;
      min-width: 256px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: transform 0.3s ease;
      z-index: 100;
      position: relative;
    }

    .sidebar-top {
      padding: 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      background: var(--glass2);
      border-color: var(--border2);
    }

    .new-chat-btn i {
      color: var(--coral);
      font-size: 0.8rem;
    }

    .sidebar-label {
      padding: 14px 14px 6px;
      font-size: 0.6rem;
      color: var(--text3);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: var(--font-c);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }

    .chat-list::-webkit-scrollbar {
      width: 3px;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .chat-item:hover {
      background: var(--glass2);
    }

    .chat-item.active {
      background: var(--coral-dim);
      border: 1px solid var(--border2);
    }

    .chat-item-text {
      font-size: 0.8rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .chat-item.active .chat-item-text {
      color: var(--text);
    }

    .chat-delete {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      font-size: 0.7rem;
    }

    .chat-item:hover .chat-delete {
      opacity: 1;
    }

    .chat-delete:hover {
      color: var(--coral);
    }

    .sidebar-bottom {
      padding: 10px;
      border-top: 1px solid var(--border);
    }

    /* Profile card in sidebar */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--glass);
      border: 1px solid var(--border);
    }

    .profile-card:hover {
      background: var(--glass2);
    }

    .profile-av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), #ff8c00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
      border: 2px solid var(--border2);
      overflow: hidden;
      font-family: var(--font-h);
    }

    .profile-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .profile-name-text {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-status {
      font-size: 0.65rem;
      color: var(--coral);
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-c);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--coral);
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8)
      }
    }

    /* ============================
         MAIN
      ============================*/
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* TOPBAR */
    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(5, 5, 7, 0.7);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .topbar-logo {
      width: 26px;
      height: 26px;
      filter: drop-shadow(0 0 6px var(--coral-glow));
    }

    .topbar-title {
      font-family: var(--font-h);
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: var(--text2);
    }

    .topbar-title span {
      color: var(--coral);
    }

    /* Top-right profile circle */
    .topbar-profile {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), #ff8c00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      border: 2px solid var(--border2);
      overflow: hidden;
      font-family: var(--font-h);
      flex-shrink: 0;
      transition: box-shadow 0.3s;
      position: relative;
    }

    .topbar-profile:hover {
      box-shadow: 0 0 16px var(--coral-glow);
    }

    .topbar-profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Profile dropdown */
    .profile-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 16px;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 8px;
      min-width: 200px;
      z-index: 200;
      display: none;
      animation: dropIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .profile-dropdown.show {
      display: block;
    }

    @keyframes dropIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .drop-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    .drop-uname {
      font-family: var(--font-h);
      font-size: 0.78rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .drop-email {
      font-size: 0.68rem;
      color: var(--text3);
      font-family: var(--font-c);
    }

    .drop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text2);
      transition: background 0.15s, color 0.15s;
    }

    .drop-item:hover {
      background: var(--glass2);
      color: var(--text);
    }

    .drop-item i {
      color: var(--coral);
      font-size: 0.78rem;
      width: 14px;
    }

    .drop-item.danger:hover {
      color: var(--coral);
    }

    /* ============================
         MESSAGES
      ============================*/
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .messages-wrap::-webkit-scrollbar {
      width: 3px;
    }

    .messages-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .messages-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 36px 20px 20px;
    }

    /* WELCOME */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 20px;
    }

    .welcome-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 14px var(--coral-glow));
      animation: welcomeFloat 4s ease-in-out infinite;
    }

    @keyframes welcomeFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .welcome h1 {
      font-family: var(--font-h);
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .welcome h1 span {
      color: var(--coral);
    }

    .welcome p {
      color: var(--text2);
      font-size: 0.9rem;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }

    .sug-card {
      padding: 14px 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.25s;
      color: var(--text);
      backdrop-filter: blur(10px);
    }

    .sug-card:hover {
      background: var(--coral-dim);
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 76, 76, 0.1);
    }

    .sug-card .s-icon {
      font-size: 1.1rem;
      margin-bottom: 8px;
      display: block;
    }

    .sug-card .s-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--text);
      font-family: var(--font-b);
    }

    .sug-card .s-sub {
      font-size: 0.7rem;
      color: var(--text3);
    }

    /* MESSAGES */
    .message-row {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;

    // ================================================
    // RENDER MESSAGES
    // ================================================
    function renderMessages() {
      const inner = document.getElementById('messagesInner');
      if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
        showWelcome(); return;
      }
      inner.innerHTML = chats[currentChatId].messages.map(m => buildMsgHTML(m.role, m.content)).join('');
      scrollToBottom();
    }

    function buildMsgHTML(role, content) {
      const isBot = role === 'assistant';
      const avatar = userProfile.avatar;
      const name = userProfile.name || 'You';

      const avHTML = isBot
        ? `<div class="msg-av bot">${LOGO_SVG}</div>`
        : `<div class="msg-av usr">${avatar ? `<img src="${avatar}" alt=""/>` : `<i class="fa-solid fa-user" style="font-size:0.65rem"></i>`}</div>`;

      return `
        <div class="message-row ${isBot ? '' : 'user'}">
          ${avHTML}
          <div class="msg-content">
            <div class="msg-name">${isBot ? 'Nexus ⚡' : name}</div>
            <div class="msg-bubble ${isBot ? 'bot' : 'usr'}">${formatMsg(content)}</div>
          </div>
        </div>
      `;
    }

    function formatMsg(text) {
      // Gallery trigger
      if (text.includes('[OPEN_GALLERY]')) {
        text = text.replace('[OPEN_GALLERY]',
          `<span onclick="openGallery()" style="color:var(--coral);cursor:pointer;text-decoration:underline;text-underline-offset:3px;">
        ⚡ Open Gallery
      </span>`
        );
      }

      text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    // ================================================
    // SEND MESSAGE
    // ================================================
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      hapticFeedback([8]);

      if (!currentChatId) {
        const id = 'chat_' + Date.now();
        chats[id] = { id, title: text.slice(0, 40), messages: [], createdAt: Date.now() };
        currentChatId = id;
        saveChats();
        renderChatList();
      }

      if (chats[currentChatId].messages.length === 0) updateChatTitle(currentChatId, text);

      chats[currentChatId].messages.push({ role: 'user', content: text });
      saveChats();

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').classList.remove('active');

      const inner = document.getElementById('messagesInner');
      inner.innerHTML += buildMsgHTML('user', text);

      const typingId = 'typing_' + Date.now();
      inner.innerHTML += `
        <div class="message-row" id="${typingId}">
          <div class="msg-av bot">${LOGO_SVG}</div>
          <div class="msg-content">
            <div class="msg-name">Nexus ⚡</div>
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      `;
      scrollToBottom();

      try {
        const msgs = chats[currentChatId].messages.map(m => ({ role: m.role, content: m.content }));

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: buildContext(userProfile.name) },
              ...msgs
            ]
          })
        });

        const data = await res.json();
        document.getElementById(typingId)?.remove();

        if (data.error) throw new Error(data.error.message);

        const reply = data.choices[0].message.content;
        chats[currentChatId].messages.push({ role: 'assistant', content: reply });
        saveChats();

        inner.innerHTML += buildMsgHTML('assistant', reply);
        scrollToBottom();
        hapticFeedback([5]);

      } catch (err) {
        document.getElementById(typingId)?.remove();
        inner.innerHTML += buildMsgHTML('assistant', 'Connection issue — please check your network and try again. ⚡');
        scrollToBottom();
      }
    }

    function quickSend(text) {
      document.getElementById('messageInput').value = text;
      document.getElementById('sendBtn').classList.add('active');
      sendMessage();
    }

    // ================================================
    // INPUT HANDLERS
    // ================================================
    function handleInput(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 150) + 'px';
      const btn = document.getElementById('sendBtn');
      if (el.value.trim()) btn.classList.add('active');
      else btn.classList.remove('active');
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollToBottom() {
      const wrap = document.getElementById('messagesWrap');
      setTimeout(() => { wrap.scrollTop = wrap.scrollHeight; }, 50);
    }

    // ================================================
    // INIT
    // ================================================
    function openGallery() {
      const panel = document.getElementById('galleryPanel');
      const frame = document.getElementById('galleryFrame');
      panel.style.display = 'flex';
      if (!frame.src || frame.src === window.location.href) {
        frame.src = 'gallery.html';
      }
    }

    function closeGallery() {
      document.getElementById('galleryPanel').style.display = 'none';
    }
    loadChats();
  </script>
